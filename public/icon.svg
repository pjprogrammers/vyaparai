<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VyaparAI">
  <defs>
    <linearGradient id="tile" x1="48" y1="48" x2="464" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="vgrad" x1="150" y1="150" x2="370" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#C7D2FE"/>
    </linearGradient>
    <linearGradient id="spark" x1="320" y1="120" x2="430" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A5F3FC"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#818CF8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#818CF8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- App tile -->
  <rect x="24" y="24" width="464" height="464" rx="120" fill="url(#tile)"/>
  <rect x="24.75" y="24.75" width="462.5" height="462.5" rx="119.25" stroke="#FFFFFF" stroke-opacity="0.14"/>

  <!-- soft inner glow -->
  <circle cx="256" cy="266" r="180" fill="url(#glow)"/>

  <!-- The 'V' = two folded panels forming an upward chevron (growth / Vyapar) -->
  <path d="M132 158
           L256 326
           L380 158
           L330 158
           L256 270
           L182 158 Z"
        fill="url(#vgrad)"/>

  <!-- Three ascending bars rising out of the V apex (data / automation) -->
  <rect x="214" y="318" width="20" height="58" rx="10" fill="#A5B4FC"/>
  <rect x="246" y="300" width="20" height="76" rx="10" fill="#C7D2FE"/>
  <rect x="278" y="284" width="20" height="92" rx="10" fill="#FFFFFF"/>

  <!-- AI spark node, upper-right -->
  <g>
    <path d="M392 132
             c11 0 20 9 20 20 0 8 -4 14 -11 18 8 4 13 12 13 21 0 13 -11 24 -24 24
             -9 0 -17 -5 -21 -12 -6 7 -14 11 -23 11 -15 0 -28 -12 -28 -28
             0 -11 7 -21 17 -25 -3 -8 -3 -18 2 -25 6 -10 16 -15 28 -14 11 1 20 9 24 18 6 -5 12 -7 19 -5 Z"
          fill="url(#spark)"/>
    <circle cx="372" cy="184" r="7.5" fill="#0E7490"/>
    <circle cx="398" cy="176" r="5.5" fill="#0E7490"/>
    <circle cx="382" cy="208" r="5.5" fill="#0E7490"/>
  </g>
</svg>
