<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VyaparAI">
  <defs>
    <!-- Primary golden gradient -->
    <linearGradient id="goldMain" x1="120" y1="100" x2="392" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="0.35" stop-color="#FBBF24"/>
      <stop offset="0.7" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <!-- Secondary warm gradient for V stroke -->
    <linearGradient id="goldStroke" x1="160" y1="140" x2="352" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FEF3C7"/>
      <stop offset="0.5" stop-color="#FCD34D"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <!-- Accent gradient for spark -->
    <linearGradient id="sparkGrad" x1="350" y1="100" x2="430" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FEF9C3"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <!-- Radial glow behind V -->
    <radialGradient id="vGlow" cx="0.5" cy="0.48" r="0.45" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#FBBF24" stop-opacity="0.18"/>
      <stop offset="0.6" stop-color="#F59E0B" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <!-- Bar gradients (ascending data visualization) -->
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#92400E"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#B45309"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#D97706"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
    <!-- Subtle border gradient -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBBF24" stop-opacity="0.3"/>
      <stop offset="0.5" stop-color="#F59E0B" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#D97706" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Dark background tile with premium rounded corners -->
  <rect x="0" y="0" width="512" height="512" rx="108" fill="#0C0C0F"/>

  <!-- Subtle inner border for premium depth -->
  <rect x="1" y="1" width="510" height="510" rx="107" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- Geometric grid pattern overlay (circuit/tech texture) -->
  <g opacity="0.04" stroke="#FBBF24" stroke-width="0.8">
    <!-- Horizontal grid lines -->
    <line x1="80" y1="128" x2="432" y2="128"/>
    <line x1="80" y1="192" x2="432" y2="192"/>
    <line x1="80" y1="256" x2="432" y2="256"/>
    <line x1="80" y1="320" x2="432" y2="320"/>
    <line x1="80" y1="384" x2="432" y2="384"/>
    <!-- Vertical grid lines -->
    <line x1="128" y1="80" x2="128" y2="432"/>
    <line x1="192" y1="80" x2="192" y2="432"/>
    <line x1="256" y1="80" x2="256" y2="432"/>
    <line x1="320" y1="80" x2="320" y2="432"/>
    <line x1="384" y1="80" x2="384" y2="432"/>
  </g>

  <!-- Node junction points on grid -->
  <g fill="#FBBF24" opacity="0.06">
    <circle cx="128" cy="192" r="2.5"/>
    <circle cx="192" cy="128" r="2.5"/>
    <circle cx="320" cy="192" r="2.5"/>
    <circle cx="384" cy="320" r="2.5"/>
    <circle cx="128" cy="384" r="2.5"/>
    <circle cx="384" cy="128" r="2.5"/>
    <circle cx="256" cy="384" r="2.5"/>
    <circle cx="192" cy="320" r="2.5"/>
  </g>

  <!-- Circuit trace lines from edges -->
  <g stroke="#FBBF24" stroke-width="0.6" opacity="0.08" fill="none">
    <path d="M48 168 L96 168 L96 128"/>
    <path d="M48 344 L80 344"/>
    <path d="M464 168 L416 168 L416 128"/>
    <path d="M464 344 L432 344"/>
    <path d="M168 48 L168 80"/>
    <path d="M344 48 L344 80"/>
    <path d="M168 464 L168 432"/>
    <path d="M344 464 L344 432"/>
  </g>

  <!-- Soft golden radial glow behind the V -->
  <circle cx="256" cy="248" r="160" fill="url(#vGlow)"/>

  <!-- Data bars rising from bottom-left (ascending automation) -->
  <g>
    <rect x="100" y="370" width="14" height="44" rx="7" fill="url(#bar1)" opacity="0.6"/>
    <rect x="124" y="350" width="14" height="64" rx="7" fill="url(#bar1)" opacity="0.7"/>
    <rect x="148" y="330" width="14" height="84" rx="7" fill="url(#bar2)" opacity="0.75"/>
    <rect x="172" y="310" width="14" height="104" rx="7" fill="url(#bar2)" opacity="0.8"/>
  </g>

  <!-- Data bars rising from bottom-right -->
  <g>
    <rect x="326" y="380" width="14" height="34" rx="7" fill="url(#bar3)" opacity="0.65"/>
    <rect x="350" y="358" width="14" height="56" rx="7" fill="url(#bar3)" opacity="0.72"/>
    <rect x="374" y="338" width="14" height="76" rx="7" fill="url(#bar4)" opacity="0.8"/>
    <rect x="398" y="318" width="14" height="96" rx="7" fill="url(#bar4)" opacity="0.88"/>
  </g>

  <!-- Main V chevron mark (premium, bold, two-tone) -->
  <path d="M128 168 L256 310 L384 168 L340 168 L256 268 L172 168 Z"
        fill="url(#goldMain)"/>
  <!-- Inner V accent stroke for depth -->
  <path d="M160 178 L256 290 L352 178 L324 178 L256 252 L188 178 Z"
        fill="none" stroke="#FEF3C7" stroke-width="1.5" stroke-opacity="0.35"/>

  <!-- Ascending data bars at V apex (automation/growth) -->
  <rect x="212" y="280" width="11" height="26" rx="5.5" fill="#92400E" opacity="0.9"/>
  <rect x="230" y="264" width="11" height="42" rx="5.5" fill="#B45309" opacity="0.9"/>
  <rect x="248" y="248" width="11" height="58" rx="5.5" fill="#D97706" opacity="0.9"/>
  <rect x="266" y="234" width="11" height="72" rx="5.5" fill="#F59E0B"/>
  <rect x="284" y="220" width="11" height="86" rx="5.5" fill="#FBBF24"/>

  <!-- AI sparkle icon, upper-right quadrant -->
  <g transform="translate(370, 120)">
    <!-- Four-pointed star shape -->
    <path d="M0 -28 C4 -8, 8 -4, 28 0 C8 4, 4 8, 0 28 C-4 8, -8 4, -28 0 C-8 -4, -4 -8, 0 -28 Z"
          fill="url(#sparkGrad)" opacity="0.9"/>
    <!-- Inner sparkle core -->
    <circle cx="0" cy="0" r="4" fill="#FEF3C7"/>
    <!-- Satellite dots -->
    <circle cx="-14" cy="-14" r="2.5" fill="#FDE68A" opacity="0.7"/>
    <circle cx="14" cy="-10" r="2" fill="#FBBF24" opacity="0.6"/>
    <circle cx="10" cy="14" r="2" fill="#FDE68A" opacity="0.5"/>
  </g>

  <!-- Secondary small spark, left side -->
  <g transform="translate(115, 150)">
    <path d="M0 -14 C2 -5, 3 -2, 14 0 C3 2, 2 4, 0 14 C-2 4, -3 2, -14 0 C-3 -2, -2 -5, 0 -14 Z"
          fill="#FDE68A" opacity="0.45"/>
    <circle cx="0" cy="0" r="2" fill="#FEF3C7" opacity="0.6"/>
  </g>

  <!-- Tiny decorative dots scattered (stars/data points) -->
  <g fill="#FBBF24">
    <circle cx="92" cy="112" r="1.8" opacity="0.35"/>
    <circle cx="420" cy="96" r="1.5" opacity="0.25"/>
    <circle cx="440" cy="400" r="1.8" opacity="0.3"/>
    <circle cx="72" cy="420" r="1.5" opacity="0.25"/>
    <circle cx="430" cy="248" r="1.2" opacity="0.2"/>
    <circle cx="82" cy="296" r="1.2" opacity="0.2"/>
  </g>

  <!-- Brand text "VYAPARAI" at bottom -->
  <text x="256" y="468" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="28" font-weight="700" letter-spacing="6"
        fill="#FBBF24" opacity="0.85">VYAPARAI</text>
</svg>
